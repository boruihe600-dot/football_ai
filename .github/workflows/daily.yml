name: Football Daily

on:
  workflow_dispatch:

  schedule:
    - cron: '0 23 * * *'

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
